<div class="shell" [class.shell--collapsed]="collapsed()">
  <!-- ===== Sidebar ===== -->
  <aside class="sidebar">
    <!-- Brand -->
    <div class="sidebar__brand">
      <div class="sidebar__logo">
        <div class="sidebar__logo-dome"></div>
      </div>
      @if (!collapsed()) {
        <span class="sidebar__title">qc builder</span>
      }
    </div>

    <!-- Navigation -->
    <nav class="sidebar__nav">
      @for (item of navItems; track item.route) {
        <a
          class="sidebar__link"
          [routerLink]="item.route"
          routerLinkActive="sidebar__link--active"
          [attr.title]="collapsed() ? item.label : null"
        >
          @if (item.icon === 'dashboard') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" class="sidebar__icon">
              <rect x="3" y="3" width="7" height="9" rx="1" />
              <rect x="14" y="3" width="7" height="5" rx="1" />
              <rect x="14" y="12" width="7" height="9" rx="1" />
              <rect x="3" y="16" width="7" height="5" rx="1" />
            </svg>
          }
          @if (item.icon === 'folder') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" class="sidebar__icon">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
          }
          @if (!collapsed()) {
            <span>{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <!-- Collapse toggle -->
    <button class="sidebar__toggle" (click)="toggleSidebar()" [attr.title]="collapsed() ? 'Expand' : 'Collapse'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" class="sidebar__icon"
           [class.sidebar__icon--flipped]="collapsed()">
        <polyline points="15 18 9 12 15 6" />
      </svg>
      @if (!collapsed()) {
        <span>collapse</span>
      }
    </button>
  </aside>

  <!-- ===== Main content ===== -->
  <main class="content">
    <router-outlet />
  </main>
</div>
